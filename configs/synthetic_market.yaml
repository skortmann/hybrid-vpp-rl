# Quick-start configuration on SYNTHETIC market data — runs without access to
# the private iaew-marktdaten.db. Prices/renewables are generated, clearly
# labelled synthetic, and must not be used for claims about real German
# market revenues. Splits lie inside the generated year (2025).

site:
  name: hybrid-park-synthetic
  wind:
    capacity_mw: 70.0
    latitude: 53.4
    longitude: 8.1
    hub_height_m: 100.0
    turbine_model: "Vestas V112 3000"
    offshore: false
  pv:
    capacity_mw: 50.0
    latitude: 53.4
    longitude: 8.1
    system_loss: 0.1
    tilt_deg: 35.0
    azimuth_deg: 180.0
    tracking: 0
  battery:
    energy_capacity_mwh: 60.0
    charge_power_mw: 30.0
    discharge_power_mw: 30.0
    charge_efficiency: 0.95
    discharge_efficiency: 0.95
    soc_min: 0.05
    soc_max: 0.95
    soc_initial: 0.5
    soc_terminal_target: 0.5
    degradation_cost_eur_per_mwh_throughput: 1.5
  grid:
    export_limit_mw: 100.0
    import_limit_mw: 30.0
    allow_grid_import: true
    congestion_resolution:
      mode: optimization
      weights: { bess_deviation: 1.0, wind_curtailment: 10.0, pv_curtailment: 10.0 }

markets:
  bidding_zone: DE_LU
  daa_quarter_hourly_from: "2025-10-01"
  daa:  { gate_closure_local: "12:00", publication_delay_min: 60, gate_day_offset: -1,
          max_volume_mw: 150.0, transaction_cost_eur_per_mwh: 0.05 }
  ida1: { gate_closure_local: "15:00", publication_delay_min: 30, gate_day_offset: -1,
          max_volume_mw: 150.0, transaction_cost_eur_per_mwh: 0.05 }
  ida2: { gate_closure_local: "22:00", publication_delay_min: 30, gate_day_offset: -1,
          max_volume_mw: 150.0, transaction_cost_eur_per_mwh: 0.05 }
  ida3: { gate_closure_local: "10:00", publication_delay_min: 30, gate_day_offset: 0,
          delivery_hours: [12, 24], max_volume_mw: 150.0,
          transaction_cost_eur_per_mwh: 0.05 }
  idc:
    decision_frequency: "1h"
    opening_local_time: "16:00"
    gate_closure_lead: "30min"
    execution_index_by_lead: { "1h": ID1, "3h": ID3, "inf": IDFULL }
    max_volume_mw_per_trade: 50.0
    transaction_cost_eur_per_mwh: 0.10
  imbalance: { model: rebap, deviation_penalty_eur_per_mwh: 0.0 }

data:
  market_database:
    mode: synthetic
    synthetic_path: data/generated/synthetic-iaew-marktdaten.db
    create_if_missing: true
  cache_dir: data/cache
  renewables_dir: data/renewables
  site_profile_source: zone_scaled

synthetic_market:
  start: "2025-01-01"
  end: "2026-01-01"
  resolution_minutes: 15
  timezone: "Europe/Berlin"
  bidding_zone: "DE_LU"
  random_seed: 42
  prices:
    allow_negative_prices: true
    positive_spikes: true
    negative_spikes: true
    minimum_price_eur_per_mwh: -500.0
    maximum_price_eur_per_mwh: 1500.0
    spikes_per_year: 40.0
    base_price_eur_per_mwh: 70.0
    residual_slope_eur_per_mwh: 90.0
  idc:
    generate_bid_ask: true
    minimum_spread_eur_per_mwh: 0.1
  imbalance:
    enabled: true
    asymmetric: false
    spread_eur_per_mwh: 10.0
  calibration:
    enabled: false
    source_database: ${MARKET_DATABASE_PATH}

split:
  train_start: "2025-01-02"
  train_end:   "2025-10-01"
  val_start:   "2025-10-01"
  val_end:     "2025-11-16"
  test_start:  "2025-11-16"
  test_end:    "2025-12-31"

forecast:
  renewable_mode: zone_scaled_error
  price_mode: seasonal_naive
  horizon: "48h"

episode:
  days: 1
  infeasibility_penalty_eur_per_mwh: 0.0

training:
  algorithm: ppo
  total_timesteps: 200000        # short demonstration run
  seed: 0
  n_envs: 4
  eval_freq: 25000
  run_name: ppo-synthetic-demo
  tracker: none
  checkpoint_dir: runs
  tensorboard_dir: runs/tb
