site_name: hybrid-vpp-rl
site_description: RL energy-management and trading framework for a hybrid wind-PV-BESS VPP (German DAA / IDA / IDC markets)
site_author: Steffen Kortmann
site_url: https://skortmann.github.io/hybrid-vpp-rl/
repo_url: https://github.com/skortmann/hybrid-vpp-rl
repo_name: skortmann/hybrid-vpp-rl
edit_uri: ""

docs_dir: docs
site_dir: site

theme:
  name: material
  features:
    - navigation.instant
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - toc.follow
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
      use_pygments: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.arithmatex:
      generic: true

extra_javascript:
  - javascripts/mathjax.js
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js

nav:
  - Home: index.md
  - Data Audit: data_audit.md
  - Model & Markets: model.md
  - RL Environment & MDP: rl_environment.md
  - Synthetic Market Data: synthetic_market_data.md
  - RL Research: rl_research.md
  - Research Supervision: research_supervision.md
